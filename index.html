<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A watercolor-inspired animated Mother's Day card."
    />
    <title>Mother's Day Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Nunito:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="card.config.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="background-wash" aria-hidden="true"></div>
    <div class="paper-texture" aria-hidden="true"></div>
    <div id="flora-layer" class="flora-layer" aria-hidden="true"></div>

    <main class="page" aria-label="Mother's Day card page">
      <article class="card" aria-label="Mother's Day card">
        <div class="card-bouquet" aria-hidden="true">
          <img src="assets/photos/photo-1.svg" alt="" class="bouquet-img" />
          <div class="bouquet-fade"></div>
        </div>

        <header class="card-header">
          <p id="recipient" class="recipient"></p>
          <h1 id="headline" class="headline"></h1>
        </header>

        <div class="card-divider" aria-hidden="true">
          <svg viewBox="0 0 200 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 9 Q55 2 100 9 Q145 16 190 9" stroke="#c8997a" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
            <circle cx="100" cy="9" r="2.5" fill="#d4a090" opacity="0.7"/>
            <circle cx="86" cy="11" r="1.5" fill="#b8c9a0" opacity="0.6"/>
            <circle cx="114" cy="11" r="1.5" fill="#b8c9a0" opacity="0.6"/>
          </svg>
        </div>

        <section id="message" class="message" aria-label="Card message"></section>

        <footer class="card-footer">
          <p id="signature" class="signature"></p>
        </footer>
      </article>
    </main>

    <noscript>
      <p class="noscript-msg">
        This card uses JavaScript for animations and personalized content.
      </p>
    </noscript>
  </body>
</html>
